name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: API integration tests
        run: |
          set -o pipefail
          timeout 15m npm run test:api 2>&1 | tee api-tests.log

      - name: Upload API test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-tests-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: api-tests.log
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  verify:
    runs-on: ubuntu-latest
    needs:
      - lint
      - api-tests
      - build
    steps:
      - name: Verify Summary
        run: echo "All CI checks passed."
